version: '3.8'

services:
  # Base de datos PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: rickmorty-db
    restart: always
    environment:
      POSTGRES_USER: rickmorty_user
      POSTGRES_PASSWORD: rickmorty_pass
      POSTGRES_DB: rickmorty_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - rickmorty-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rickmorty_user -d rickmorty_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Gateway
  gateway:
    build:
      context: ./poke-soa-gateaway
      dockerfile: Dockerfile
    container_name: rickmorty-gateway
    restart: always
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
      FRONTEND_URL: http://localhost:3000
      MICROSERVICE_URL: http://rickmorty-service:4002/api/v1/character
      NODE_ENV: production
    depends_on:
      rickmorty-service:
        condition: service_healthy
    networks:
      - rickmorty-network

  # Microservicio de Rick and Morty Characters
  rickmorty-service:
    build:
      context: ./RickandMorty-service
      dockerfile: Dockerfile
    container_name: rickmorty-service
    restart: always
    ports:
      - "4002:4002"
    environment:
      PORT: 4002
      DATABASE_URL: postgres://rickmorty_user:rickmorty_pass@postgres:5432/rickmorty_db
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rickmorty-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4002/health"]
      interval: 10s
      timeout: 5s
      retries: 5

# Redes virtuales de Docker
networks:
  rickmorty-network:
    driver: bridge
    name: rickmorty-network

# Volúmenes persistentes
volumes:
  postgres_data:
    name: rickmorty_postgres_data
